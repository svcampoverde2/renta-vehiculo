<h1 class="h1" mat-dialog-title>Recuperar contraseña</h1>
<div mat-dialog-content>
    <form [formGroup]="Recuperar" >
        <mat-form-field class="campos-field">
            <input matInput placeholder="Ingrese su correo" formControlName="correo">
        </mat-form-field>

        <div mat-dialog-action  class="op">
            <button style="margin-left: 8px;" mat-raised-button color="warn"(click)="enviar()" >Enviar</button>
        </div>
    </form>

  </div>
